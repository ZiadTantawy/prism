# Prism Prometheus config - add scrape_configs for api, workers, etc.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Uncomment and set correct host when api/workers expose /metrics
  # - job_name: api
  #   static_configs:
  #     - targets: ["api:8000"]
  # - job_name: ingestion_worker
  #   static_configs:
  #     - targets: ["ingestion_worker:9091"]
