services:
  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism}
      POSTGRES_DB: ${POSTGRES_DB:-prism}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism} -d ${POSTGRES_DB:-prism}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: prism-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6335}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: prism-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-prism}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-prism}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: prism-api
    env_file: .env
    environment:
      # Internal ports (containers always use 5432, 6333)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism}@postgres:5432/${POSTGRES_DB:-prism}
      QDRANT_URL: http://qdrant:6333
    ports:
      - "${API_PORT:-5768}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    container_name: prism-pipeline
    env_file: .env
    environment:
      # Internal ports (containers use 5432, 6333, 5672)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism}@postgres:5432/${POSTGRES_DB:-prism}
      QDRANT_URL: http://qdrant:6333
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-prism}:${RABBITMQ_PASSWORD:-prism}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  rabbitmq_data:
